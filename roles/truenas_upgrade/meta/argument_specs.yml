---
argument_specs:
  main:
    short_description: "System update and upgrade management"
    options:
      truenas_upgrade_host:
        description: Target host address
        type: str
        required: true
      truenas_upgrade_username:
        description: Authentication username
        type: str
      truenas_upgrade_password:
        description: Authentication password
        type: str
      truenas_upgrade_api_key:
        description: API key for authentication
        type: str
      truenas_upgrade_validate_certs:
        description: Validate SSL certificates
        type: bool
        default: true
      truenas_upgrade_state:
        description: Desired state
        type: str
        default: present
        choices: [present, absent]
