[tox]
envlist = lint, sanity, bandit
min_version = 4.0

[testenv:lint]
deps =
    ansible-lint
commands =
    ansible-lint {toxinidir}

[testenv:sanity]
deps =
    ansible-core>=2.16
commands_pre =
    python -c "import shutil,os; \
        dst=os.path.expanduser('~/.ansible/collections/ansible_collections/truenas/storage'); \
        shutil.rmtree(dst, ignore_errors=True); \
        shutil.copytree('{toxinidir}', dst, \
        ignore=shutil.ignore_patterns('.tox','*.egg-info','__pycache__'))"
commands =
    ansible-test sanity -v --color --local \
        --python default
changedir = {homedir}/.ansible/collections/ansible_collections/truenas/storage

[testenv:bandit]
deps =
    bandit
commands =
    bandit -r {toxinidir}/plugins/ -ll -ii
